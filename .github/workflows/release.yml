name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: tm-x86_64-unknown-linux-gnu.tar.gz
            binary_name: tm
          - runner: macos-14
            target: aarch64-apple-darwin
            archive_name: tm-aarch64-apple-darwin.tar.gz
            binary_name: tm
          - runner: macos-14
            target: x86_64-apple-darwin
            archive_name: tm-x86_64-apple-darwin.tar.gz
            binary_name: tm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          stage_dir="dist/${{ matrix.target }}"
          mkdir -p "$stage_dir"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "$stage_dir/${{ matrix.binary_name }}"
          if [ -f README.md ]; then
            cp README.md "$stage_dir/README.md"
          fi
          if [ -f LICENSE ]; then
            cp LICENSE "$stage_dir/LICENSE"
          fi
          tar -C "$stage_dir" -czf "${{ matrix.archive_name }}" .

      - name: Upload release archive
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}

